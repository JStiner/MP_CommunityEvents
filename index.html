<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Events Calendar</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="page-shell soft-light">
  <main class="phone-shell home-shell wide-shell">
    <header class="hero-card home-hero">
      <div class="hero-topline hero-topline-home">
        <div class="header">
          <div class="header-left">
            <p class="eyebrow">Community Events Demo</p>
            <h1>Community Calendar</h1>
          </div>

          <div class="header-actions">
            <span class="pill">Static Demo Data</span>

            <button
              id="theme-toggle"
              class="theme-toggle"
              type="button"
              aria-pressed="false"
              aria-label="Toggle dark mode"
            >
              <span class="theme-toggle-label">Dark mode</span>
              <span class="theme-toggle-track">
                <span class="theme-toggle-thumb"></span>
              </span>
            </button>
          </div>
        </div>

        <p class="subtle">
          This is a demo and is not intended to provide accurate or reliable information.
        </p>
      </div>
    </header>
		<div class="calendar-controls-row">
		  <div class="calendar-controls-left">
			<div class="segmented-control">
			  <button class="view-button active" data-view="month">Month</button>
			  <button class="view-button" data-view="week">Week</button>
			  <button class="view-button" data-view="day">Day</button>
			</div>
		  </div>

		  <div class="calendar-controls-center">
			<div id="calendar-filters" class="filter-chip-row"></div>
		  </div>

		  <div class="calendar-controls-right">
			<div class="calendar-nav">
			  <button id="prev-period" class="nav-button" type="button" aria-label="Previous period">←</button>
			  <div id="calendar-title" class="calendar-title"></div>
			  <button id="next-period" class="nav-button" type="button" aria-label="Next period">→</button>
			</div>
		  </div>
		</div>
    </header>

    <div class="home-content-grid">
      <section class="calendar-shell proper-calendar-shell">
        <div id="calendar-weekdays" class="calendar-weekdays month-only"></div>
        <div id="calendar-grid" class="calendar-grid"></div>
      </section>

      <aside class="info-card bucket-rail">
        <h3>Included Event Buckets</h3>
        <div id="event-summary-cards" class="grid-cards bucket-stack"></div>
      </aside>
    </div>
  </main>

  <footer class="public-footer">
    <a class="public-footer-link" href="./login.html">Log In</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/home.js"></script>
</body>
</html>

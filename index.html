<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Events Calendar</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="page-shell">
  <main class="phone-shell home-shell">
    <header class="hero-card home-hero">
      <div class="hero-topline">
        <p class="eyebrow">Community Events Demo</p>
        <span class="pill">Static Demo Data</span>
      </div>
      <h1>Community Calendar</h1>
      <p class="subtle">Defaulting to the current month. Switch between day, week, and month views, then open an event for maps, vendors, and details.</p>

      <div class="calendar-toolbar">
        <div class="segmented-control" role="tablist" aria-label="Calendar view">
          <button class="view-button active" data-view="month">Month</button>
          <button class="view-button" data-view="week">Week</button>
          <button class="view-button" data-view="day">Day</button>
        </div>

        <div class="calendar-nav">
          <button id="prev-period" class="nav-button" aria-label="Previous period">←</button>
          <div id="calendar-title" class="calendar-title">Loading...</div>
          <button id="next-period" class="nav-button" aria-label="Next period">→</button>
        </div>
      </div>
    </header>

    <section class="calendar-shell">
      <div id="calendar-weekdays" class="calendar-weekdays month-only"></div>
      <div id="calendar-grid" class="calendar-grid"></div>
    </section>

    <section class="info-card">
      <h3>Included Demo Events</h3>
      <div id="event-summary-cards" class="grid-cards"></div>
    </section>
  </main>

  <script src="assets/js/home.js"></script>
</body>
</html>

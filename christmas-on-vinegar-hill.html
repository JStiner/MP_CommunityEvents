<!DOCTYPE html>
<html lang="en" data-page-slug="christmas-on-vinegar-hill">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Christmas on Vinegar Hill</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="page-shell">
  <main class="phone-shell">
    <header class="top-bar">
      <a class="back-link" href="index.html">← Events</a>
      <span class="top-badge">Demo + Structure</span>
    </header>

    <section class="hero-card compact">
      <p id="event-eyebrow" class="eyebrow">Community Event</p>
      <h1 id="event-name">Christmas on Vinegar Hill</h1>
      <p id="event-summary" class="subtle">Loading event details...</p>
      <div class="hero-meta">
        <span id="event-dates" class="meta-chip">Dates</span>
        <span id="event-location" class="meta-chip">Location</span>
      </div>
      <div id="resource-links" class="resource-links"></div>
    </section>

    <nav class="tab-row" aria-label="Event Views">
      <button class="tab-button active" data-tab="schedule">Schedule</button>
      <button class="tab-button" data-tab="map">Map</button>
      <button class="tab-button" data-tab="vendors">Vendors</button>
      <button class="tab-button" data-tab="locations">Locations</button>
      <button class="tab-button" data-tab="flyer">Flyer</button>
    </nav>

    <section id="schedule" class="tab-panel active">
      <div id="day-filter" class="chip-row"></div>
      <div id="schedule-list" class="stack-list"></div>
    </section>

    <section id="map" class="tab-panel">
      <div class="map-card covh-map-tab-card">
        <div class="map-actions">
          <a id="interactive-map-link" class="resource-link" href="#" target="_blank" rel="noopener">View Full Interactive Map</a>
        </div>
        <div id="map-surface" class="map-surface covh-map-gallery"></div>
      </div>
      <div id="map-location-list" class="stack-list map-list"></div>
    </section>

    <section id="vendors" class="tab-panel">
      <div id="vendor-list" class="stack-list"></div>
    </section>

    <section id="locations" class="tab-panel">
      <div id="location-list" class="stack-list"></div>
    </section>

    <section id="flyer" class="tab-panel">
      <div id="flyer-panel" class="flyer-shell"></div>
    </section>
  </main>

  <div id="detail-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">
      <button id="close-modal" class="close-button" aria-label="Close">×</button>

      <div class="modal-header">
        <p id="modal-kicker" class="eyebrow"></p>
        <h2 id="modal-title"></h2>
      </div>

      <div id="modal-content" class="modal-content"></div>
    </div>
  </div>

  <footer class="public-footer">
    <a class="public-footer-link" href="./login.html">Log In</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
